<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1f2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Attendance"/>
<title>Attendance App</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<style>
/* ── Reset & Tokens ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:        #0f1219;
  --surface:   #1a1f2e;
  --surface2:  #222840;
  --border:    #2d3450;
  --primary:   #4f6ef7;
  --primary2:  #6b87ff;
  --green:     #22c55e;
  --red:       #ef4444;
  --orange:    #f97316;
  --yellow:    #eab308;
  --text:      #e8eaf6;
  --text2:     #8892b0;
  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 4px 24px rgba(0,0,0,.4);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;overflow:hidden}

/* ── Layout ─────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:auto;position:relative}
.header{padding:env(safe-area-inset-top,.75rem) 1rem .75rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.header img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--border)}
.header-info{flex:1;min-width:0}
.header-info h3{font-size:.9rem;font-weight:600;truncate:ellipsis;white-space:nowrap;overflow:hidden}
.header-info p{font-size:.75rem;color:var(--text2)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.35rem .7rem;border-radius:var(--radius-sm);font-size:.75rem;cursor:pointer;flex-shrink:0}
.logout-btn:hover{background:var(--surface2)}

.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:1rem 1rem calc(4.5rem + env(safe-area-inset-bottom))}
.page.active{display:block}
#pg-login{display:none;padding:0}
#pg-login.active{display:flex;align-items:center;justify-content:center;min-height:100dvh}

/* ── Nav ─────────────────────────────────────────────────── */
.nav{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);padding:.5rem .5rem calc(.5rem + env(safe-area-inset-bottom));gap:.25rem}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:none;color:var(--text2);font-size:.65rem;padding:.4rem;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.nav-btn .icon{font-size:1.3rem;line-height:1}
.nav-btn.active{color:var(--primary2);background:rgba(79,110,247,.12)}
.nav-btn:hover{background:var(--surface2);color:var(--text)}

/* ── Login ───────────────────────────────────────────────── */
.login-box{background:var(--surface);border-radius:var(--radius);padding:2rem 1.5rem;width:90%;max-width:360px;box-shadow:var(--shadow)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo .app-icon{font-size:3rem;display:block;margin-bottom:.5rem}
.login-logo h2{font-size:1.3rem;font-weight:700;color:var(--primary2)}
.login-logo p{font-size:.8rem;color:var(--text2);margin-top:.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.4rem;font-weight:500}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.7rem .9rem;font-size:.95rem;outline:none;transition:border .2s}
.field input:focus{border-color:var(--primary)}
.btn-primary{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:.85rem;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ── Home Page ───────────────────────────────────────────── */
.section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:600;margin-bottom:.75rem}
.today-card{background:var(--surface);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);border:1px solid var(--border)}
.status-badge{display:inline-block;padding:.35rem .9rem;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:.75rem;letter-spacing:.03em}
.status-badge.in{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.status-badge.out{background:rgba(79,110,247,.15);color:var(--primary2);border:1px solid rgba(79,110,247,.3)}
.status-badge.neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.status-hint{font-size:.85rem;color:var(--text2);margin-top:.25rem}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.status-row:last-child{border-bottom:none}
.status-row span{color:var(--text2)}
.status-row.loc{font-size:.75rem}
.loc-val{word-break:break-all;text-align:right;font-size:.75rem}

.action-btns{display:flex;gap:.75rem;margin-bottom:1rem}
.btn-in{flex:1;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:var(--radius);padding:1rem;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(34,197,94,.3);transition:opacity .2s}
.btn-out{flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:var(--radius);padding:1rem;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(239,68,68,.3);transition:opacity .2s}
.btn-in:disabled,.btn-out:disabled{opacity:.5;cursor:not-allowed}

/* Status Badges inline */
.badge-on.time,.badge-on{color:var(--green);font-weight:600}
.badge-late{color:var(--red);font-weight:600}
.badge-early{color:var(--yellow);font-weight:600}

/* ── History ─────────────────────────────────────────────── */
.hist-card{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;border:1px solid var(--border)}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.hist-date{font-weight:700;font-size:.9rem}
.att-badge{padding:.2rem .6rem;border-radius:12px;font-size:.72rem;font-weight:600}
.att-badge.present{background:rgba(34,197,94,.15);color:var(--green)}
.att-badge.absent{background:rgba(239,68,68,.15);color:var(--red)}
.att-badge.half{background:rgba(234,179,8,.15);color:var(--yellow)}
.hist-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2);margin-top:.35rem}
.hist-row b{color:var(--text)}

/* ── Admin ───────────────────────────────────────────────── */
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;align-items:flex-end}
.filter-row .field{flex:1;margin:0}
.filter-row .field input{padding:.55rem .7rem;font-size:.85rem}
.filter-row button{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:.55rem .9rem;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.summary-chips{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.chip{padding:.3rem .8rem;border-radius:20px;font-size:.78rem;font-weight:600}
.chip.blue{background:rgba(79,110,247,.15);color:var(--primary2)}
.chip.green{background:rgba(34,197,94,.15);color:var(--green)}
.chip.red{background:rgba(239,68,68,.15);color:var(--red)}
.admin-date-group{margin-bottom:1rem}
.admin-date-header{font-size:.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:.35rem 0;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.admin-date-header .cnt{font-weight:400;color:var(--primary2)}
.admin-row{background:var(--surface);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.4rem;border:1px solid var(--border)}
.admin-name{font-size:.82rem;font-weight:600;color:var(--primary2);margin-bottom:.3rem;word-break:break-all}
.admin-times{display:flex;flex-wrap:wrap;gap:.35rem .9rem;font-size:.78rem;color:var(--text2)}
.admin-times b{color:var(--text)}
.admin-times em{font-style:normal}

/* ── Misc ────────────────────────────────────────────────── */
.loader-inline{text-align:center;color:var(--text2);padding:2rem;font-size:.9rem}
.empty{text-align:center;color:var(--text2);padding:2rem;font-size:.9rem}
.err{color:var(--red);padding:1rem;font-size:.85rem}
.page-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem}

/* ── Toast ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(1.5rem);background:#1e2435;border:1px solid var(--border);color:var(--text);padding:.7rem 1.2rem;border-radius:var(--radius);font-size:.85rem;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90%;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────────── -->
<div id="pg-login" class="page">
  <div class="login-box">
    <div class="login-logo">
      <span class="app-icon">🕐</span>
      <h2>Attendance App</h2>
      <p>Mark your daily attendance</p>
    </div>
    <div class="field">
      <label>Office Email</label>
      <input id="loginEmail" type="email" placeholder="you@company.com" autocomplete="email" inputmode="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="Enter password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button id="loginBtn" class="btn-primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── APP SHELL ─────────────────────────────────────────────── -->
<div class="app" id="appShell" style="display:none">

  <!-- Header -->
  <div class="header">
    <img id="userAvatar" src="icon-192.png" alt="avatar"/>
    <div class="header-info">
      <h3 id="userName">Loading…</h3>
      <p><span id="userEmpId"></span> · <span id="userDept"></span></p>
    </div>
    <button class="logout-btn" onclick="_signOut()">Sign Out</button>
  </div>

  <!-- Pages -->
  <div class="pages">

    <!-- HOME -->
    <div id="pg-home" class="page active">
      <div class="section-title">Today's Status</div>
      <div class="today-card" id="statusCard">
        <div class="loader-inline">Loading…</div>
      </div>

      <div class="action-btns">
        <button id="checkInBtn" class="btn-in" onclick="doCheckIn()">
          📍 Check In
        </button>
        <button id="checkOutBtn" class="btn-out" onclick="doCheckOut()" style="display:none">
          🏁 Check Out
        </button>
      </div>

      <div class="section-title" style="margin-top:.5rem">Today: <span id="todayDate"></span></div>
    </div>

    <!-- HISTORY -->
    <div id="pg-history" class="page">
      <div class="page-title">My Attendance (Last 30 Days)</div>
      <div id="historyList"><div class="loader-inline">Loading…</div></div>
    </div>

    <!-- ADMIN -->
    <div id="pg-admin" class="page">
      <div class="page-title">Admin — Attendance Report</div>
      <div class="filter-row">
        <div class="field">
          <label>From</label>
          <input id="filterFrom" type="date"/>
        </div>
        <div class="field">
          <label>To</label>
          <input id="filterTo" type="date"/>
        </div>
        <button onclick="fetchAdminData()">Filter</button>
      </div>
      <div id="adminSummary"></div>
      <div id="adminList"><div class="loader-inline">Select range and tap Filter</div></div>
    </div>

  </div><!-- /pages -->

  <!-- Nav -->
  <nav class="nav">
    <button class="nav-btn active" data-page="home" onclick="showPage('home')">
      <span class="icon">🏠</span>Home
    </button>
    <button class="nav-btn" data-page="history" onclick="showPage('history')">
      <span class="icon">📋</span>History
    </button>
    <button class="nav-btn" id="adminNavBtn" data-page="admin" onclick="showPage('admin')" style="display:none">
      <span class="icon">⚙️</span>Admin
    </button>
  </nav>

</div><!-- /appShell -->

<div id="toast" class="toast"></div>

<script>
// Show correct shell
window.addEventListener('load', function() {
  // Show today's date
  var d = document.getElementById('todayDate');
  if (d) d.textContent = new Date().toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long'});

  // Decide which shell to show based on session
  var hasSession = localStorage.getItem('att_token') && localStorage.getItem('att_user');
  document.getElementById('pg-login').style.display    = hasSession ? 'none' : '';
  document.getElementById('appShell').style.display    = hasSession ? ''     : 'none';
  // Page active states handled by app.js showPage()
});

// Override showPage to also swap shells
var _origShowPage;
window.addEventListener('load', function() {
  _origShowPage = showPage;
  showPage = function(id) {
    if (id === 'login') {
      document.getElementById('pg-login').style.display  = '';
      document.getElementById('appShell').style.display  = 'none';
      document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    } else {
      document.getElementById('pg-login').style.display  = 'none';
      document.getElementById('appShell').style.display  = '';
      _origShowPage(id);
    }
  };
});
</script>
<script src="app.js"></script>
</body>
</html>
